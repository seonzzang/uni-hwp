name: Deploy Uni-HWP Site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-site:
    name: Build site and web demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/studio/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM pkg
        run: wasm-pack build --target web --out-dir pkg --release

      - name: Install frontend dependencies
        working-directory: apps/studio
        run: npm ci --prefer-offline --no-audit

      - name: Build web demo
        working-directory: apps/studio
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE: "/uni-hwp/demo/"
        run: npm run build

      - name: Assemble Pages site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf pages-site
          mkdir -p pages-site/demo pages-site/assets/landing
          cp site/index.html pages-site/index.html
          cp -R site/assets/landing/. pages-site/assets/landing/
          cp -R apps/studio/dist/. pages-site/demo/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  deploy-site:
    name: Deploy site
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
